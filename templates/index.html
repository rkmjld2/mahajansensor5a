<script>
let chart;

// -------- START / STOP --------
async function start(){ await fetch('/start'); }
async function stop(){ await fetch('/stop'); }

// -------- LOAD DATA --------
async function loadData(){
    let res = await fetch('/data');
    let data = await res.json();
    showData(data);
}

// -------- STATUS (FIXED) --------
async function status(){
    let res = await fetch('/status');
    let d = await res.json();

    let el = document.getElementById("status");

    // ✅ Show time + color
    el.innerText = d.status + " (" + d.last_seen_seconds + "s ago)";

    if(d.status === "Connected"){
        el.style.color = "green";
    } else {
        el.style.color = "red";
    }
}

// -------- SHOW TABLE --------
function showData(data){
    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach(r => {
        let row = `<tr>
            <td>${r.id || ""}</td>
            <td>${r.sensor1 || ""}</td>
            <td>${r.sensor2 || ""}</td>
            <td>${r.sensor3 || ""}</td>
            <td>${r.timestamp || ""}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

// -------- SEARCH --------
async function search(){
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    let res = await fetch('/search', {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: `start=${start}&end=${end}`
    });

    let data = await res.json();
    showData(data);
}

// -------- GRAPH --------
async function drawChart(){

    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;
    let type = document.getElementById("chartType").value;

    let res = await fetch('/search', {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: `start=${start}&end=${end}`
    });

    let data = await res.json();

    let labels = data.map(d => d.timestamp);
    let s1 = data.map(d => d.sensor1);
    let s2 = data.map(d => d.sensor2);
    let s3 = data.map(d => d.sensor3);

    if(chart) chart.destroy();

    let ctx = document.getElementById("myChart").getContext("2d");

    chart = new Chart(ctx, {
        type: type,
        data: {
            labels: labels,
            datasets: [
                { label: "Sensor 1", data: s1, borderWidth: 2 },
                { label: "Sensor 2", data: s2, borderWidth: 2 },
                { label: "Sensor 3", data: s3, borderWidth: 2 }
            ]
        }
    });
}

// -------- DOWNLOAD --------
function downloadCSV(){
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    fetch('/download', {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: `start=${start}&end=${end}`
    })
    .then(res => res.blob())
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "sensor_data.csv";
        a.click();
    });
}

// -------- CUSTOM QUERY --------
async function runQuery(){
    let q = document.getElementById("query").value;

    let res = await fetch('/query', {
        method:"POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body:`query=${q}`
    });

    let data = await res.json();

    if (Array.isArray(data)) {
        showData(data);
    } else {
        alert("✔ " + data.message + "\nRows: " + data.rows_affected);
        loadData();
    }
}

// -------- AUTO REFRESH --------
setInterval(loadData, 5000);
setInterval(status, 3000);

// ✅ IMPORTANT: run immediately on page load
window.onload = function(){
    loadData();
    status();
};
</script>
